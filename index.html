<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Modificaciones de Rutas 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  /* ── THEME TOKENS (overridden by JS) ─────────────────────────────────── */
  :root {
    --bg:#0d0f14; --bg2:#161922; --panel:#1a1f2e; --border:#252a35;
    --text:#f0f4ff; --text2:#94a3b8; --muted:#64748b;
    --accent1:#ff4d6d; --accent2:#00d4ff; --accent3:#bf5af2;
    --accent4:#00e676; --accent5:#ffab00; --accent6:#ff6b35;
    --card-bg:#1a1f2e; --card-border:#2d3548;
    --select-bg:#111827; --radius:12px; --shadow:0 4px 28px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;transition:background .35s,color .35s}

  /* ── HEADER ── */
  header{background:var(--bg2);border-bottom:1px solid var(--border);padding:18px 32px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;transition:background .35s,border-color .35s}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent1),var(--accent3));
    border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  h1{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;color:var(--text)}
  h1 span{color:var(--accent2)}
  .header-meta{font-size:.72rem;color:var(--text2);margin-top:2px}
  #last-update{font-size:.72rem;color:var(--text2)}

  /* ── TOOLBAR ── */
  .toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 32px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;transition:background .35s,border-color .35s}
  .toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
  .tool-label{font-size:.72rem;color:var(--text2);white-space:nowrap;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

  /* upload btn */
  .upload-btn{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--accent1),var(--accent3));
    color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:.8rem;font-weight:700;
    cursor:pointer;transition:opacity .2s;white-space:nowrap;flex-shrink:0}
  .upload-btn:hover{opacity:.82}
  .upload-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
  #file-name{font-size:.78rem;color:var(--accent4);font-weight:600}
  .status-pill{display:flex;align-items:center;gap:6px;background:var(--select-bg);
    border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.72rem;color:var(--text2);white-space:nowrap}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .status-dot.active{background:#00e676;box-shadow:0 0 7px #00e676}

  /* ── GOOGLE SHEET SYNC ── */
  #gsheet-url{background:var(--select-bg);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:6px 12px;font-size:.78rem;min-width:220px;max-width:340px}
  #gsheet-url:focus{outline:none;border-color:var(--accent2)}
  .sync-btn{background:linear-gradient(135deg,var(--accent2),var(--accent3));color:#fff;border:none;
    border-radius:8px;padding:7px 14px;font-size:.8rem;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
  .sync-btn:hover{opacity:.82}
  .sync-btn:disabled{opacity:.5;cursor:not-allowed}
  #sync-status{font-size:.72rem;color:var(--text2)}

  /* ── PALETTE + BG BARS ── */
  .ctrl-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:9px 32px;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:background .35s,border-color .35s}
  .ctrl-bar label{font-size:.72rem;color:var(--text2);white-space:nowrap;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
  .ctrl-sep{width:1px;height:20px;background:var(--border);margin:0 6px}
  .chip-row{display:flex;gap:6px;flex-wrap:wrap}

  .chip{display:flex;align-items:center;gap:6px;background:var(--select-bg);border:1.5px solid var(--border);
    border-radius:20px;padding:4px 12px;font-size:.73rem;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
  .chip:hover{border-color:var(--accent2);color:var(--text)}
  .chip.active{border-color:var(--accent2);color:var(--text);background:rgba(0,212,255,.1)}
  .chip-dots{display:flex;gap:3px}
  .chip-dot{width:9px;height:9px;border-radius:50%}

  /* bg chips use a swatch instead of dots */
  .bg-swatch{width:18px;height:18px;border-radius:5px;border:1px solid rgba(255,255,255,.15);flex-shrink:0}

  /* ── FILTERS (CHECKLIST MULTIPLE) ── */
  .filters{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 32px;
    display:flex;align-items:center;gap:15px;flex-wrap:wrap;transition:background .35s,border-color .35s}
  
  .dropdown-checklist {
    position: relative;
    display: inline-block;
  }
  .dropdown-checklist-label {
    font-size:.72rem;
    color:var(--text2);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.05em;
    display: block;
    margin-bottom: 4px;
  }
  .dropdown-checklist-btn {
    background: var(--select-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 30px 6px 12px;
    font-size: .78rem;
    cursor: pointer;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 140px;
    max-width: 220px;
    position: relative;
    user-select: none;
    transition: border-color .2s;
  }
  .dropdown-checklist-btn:focus {
    border-color: var(--accent2);
  }
  .dropdown-checklist-btn::after {
    content: "▼";
    font-size: 0.6rem;
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    transition: transform 0.2s;
  }
  .dropdown-checklist.open .dropdown-checklist-btn::after {
    transform: translateY(-50%) rotate(180deg);
  }
  .dropdown-checklist-content {
    display: none;
    position: absolute;
    background-color: var(--card-bg);
    min-width: 200px;
    max-height: 280px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    z-index: 1000;
    margin-top: 4px;
    padding: 6px 0;
  }
  .dropdown-checklist.open .dropdown-checklist-content {
    display: block;
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    padding: 6px 14px;
    font-size: .78rem;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .dropdown-item:hover {
    background: rgba(255,255,255,0.05);
  }
  .dropdown-item input[type="checkbox"] {
    margin-right: 10px;
    accent-color: var(--accent2);
    cursor: pointer;
    width: 14px;
    height: 14px;
  }
  
  .btn-reset{margin-left:auto;align-self:flex-end;margin-bottom:2px;background:transparent;border:1px solid var(--border);
    color:var(--text2);border-radius:8px;padding:6px 14px;font-size:.76rem;cursor:pointer;transition:all .2s}
  .btn-reset:hover{border-color:var(--accent1);color:var(--accent1)}

  /* ── MAIN ── */
  main{padding:26px 32px;display:flex;flex-direction:column;gap:22px}

  /* ── CARDS ── */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);
    padding:20px 22px;position:relative;overflow:hidden;transition:transform .2s,background .35s,border-color .35s}
  .card:hover{transform:translateY(-2px)}
  .card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
  .card.c1::before{background:var(--accent1)}
  .card.c2::before{background:var(--accent4)}
  .card.c3::before{background:var(--accent5)}
  .card.c4::before{background:var(--accent3)}
  .card-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:7px}
  .card-value{font-size:1.95rem;font-weight:800;letter-spacing:-.03em;line-height:1}
  .card.c1 .card-value{color:var(--accent1)}
  .card.c2 .card-value{color:var(--accent4)}
  .card.c3 .card-value{color:var(--accent5)}
  .card.c4 .card-value{color:var(--accent3)}
  .card-sub{font-size:.72rem;color:var(--text2);margin-top:5px}
  .card-badge{position:absolute;top:16px;right:16px;font-size:1.4rem;opacity:.12}

  /* ── CHART GRID ── */
  /* auto-fit: cuando el usuario oculta gráficos con los chips de "Gráficos en pantalla",
     los que quedan visibles se reparten y agrandan solos para llenar el espacio. */
  .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:18px}
  .chart-grid .full{grid-column:1/-1}
  .chart-box{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);
    padding:20px 22px;display:flex;flex-direction:column;gap:12px;transition:background .35s,border-color .35s,box-shadow .2s}
  .chart-title{font-size:.83rem;font-weight:700;color:var(--text)}
  .chart-sub{font-size:.7rem;color:var(--text2);margin-top:2px}
  .chart-wrap{position:relative;transition:height .25s ease}
  .chart-wrap canvas{width:100% !important}

  /* ── PER-CHART CONTROLS (reporte / tamaño / captura) ── */
  .chart-box-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .box-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .box-btn{background:var(--select-bg);border:1px solid var(--border);color:var(--text2);
    border-radius:6px;width:26px;height:26px;font-size:.78rem;cursor:pointer;display:flex;
    align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
  .box-btn:hover{border-color:var(--accent2);color:var(--text)}

  /* ── EMPTY ── */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:220px;color:var(--text2);font-size:.85rem;gap:8px}
  .empty-icon{font-size:2.5rem;opacity:.3}

  /* ── TOAST ── */
  #toast{position:fixed;bottom:26px;right:26px;z-index:9999;background:var(--panel);
    border:1px solid var(--border);border-radius:10px;padding:13px 18px;font-size:.8rem;
    color:var(--text);box-shadow:var(--shadow);opacity:0;transform:translateY(10px);
    transition:all .3s;pointer-events:none;max-width:300px}
  #toast.show{opacity:1;transform:translateY(0)}
  #toast .t-title{font-weight:700;margin-bottom:3px}

  @media(max-width:900px){
    main{padding:18px 14px}
    .chart-grid{grid-template-columns:1fr}
    .chart-grid .full{grid-column:1}
    header,.toolbar,.ctrl-bar,.filters{padding:12px 14px}
  }
  @media(max-width:500px){.cards{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}.card-value{font-size:1.45rem}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🗺️</div>
    <div>
      <h1>Rutas <span>2026</span> · Modificaciones</h1>
      <div class="header-meta" id="header-meta">Carga un archivo para comenzar</div>
    </div>
  </div>
  <div id="last-update"></div>
</header>

<div class="toolbar">
  <span class="tool-label">📂 Datos:</span>
  <label class="upload-btn">⬆ Cargar Excel / CSV<input type="file" id="file-input" accept=".xlsx,.xls,.csv"></label>
  <span id="file-name">Ningún archivo</span>
  <div class="toolbar-sep"></div>
  <span class="tool-label">🔗 Google Sheet:</span>
  <input type="text" id="gsheet-url" placeholder="Pega el link CSV publicado del Google Sheet…">
  <button class="sync-btn" id="gsheet-connect" onclick="connectGSheet()">Conectar</button>
  <button class="sync-btn" id="gsheet-pause" onclick="toggleGSheetAutoRefresh()" style="background:var(--select-bg);border:1px solid var(--border);display:none">⏸️ Pausar auto-actualización</button>
  <span id="sync-status"></span>
  <div class="status-pill">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Sin datos</span>
  </div>
  <div class="toolbar-sep"></div>
  <button class="sync-btn" id="ctrlbar-toggle" style="background:var(--select-bg);border:1px solid var(--border)" onclick="toggleCtrlBar()">🧰 Ocultar herramientas</button>
</div>

<div class="ctrl-bar" id="ctrl-bar">
  <label>🎨 Tipo de paleta:</label>
  <div class="chip-row" id="paltype-row">
    <button class="chip active" data-ptype="categorica" onclick="setPalType('categorica',this)">🔷 Categórica</button>
    <button class="chip" data-ptype="secuencial" onclick="setPalType('secuencial',this)">📶 Secuencial</button>
    <button class="chip" data-ptype="divergente" onclick="setPalType('divergente',this)">⇔ Divergente</button>
  </div>

  <div class="ctrl-sep"></div>

  <label>🎚️ Escala:</label>
  <div class="chip-row" id="palvariant-row"></div>

  <div class="ctrl-sep"></div>

  <label>🖥️ Fondo:</label>
  <div class="chip-row" id="bg-row">
    <button class="chip active" data-bg="dark" onclick="setBg('dark',this)">
      <div class="bg-swatch" style="background:#0d0f14"></div>Oscuro
    </button>
    <button class="chip" data-bg="slate" onclick="setBg('slate',this)">
      <div class="bg-swatch" style="background:#0f172a"></div>Pizarra
    </button>
    <button class="chip" data-bg="charcoal" onclick="setBg('charcoal',this)">
      <div class="bg-swatch" style="background:#1c1c2e"></div>Carbón
    </button>
    <button class="chip" data-bg="light" onclick="setBg('light',this)">
      <div class="bg-swatch" style="background:#f1f5f9;border-color:#cbd5e1"></div>Claro
    </button>
    <button class="chip" data-bg="white" onclick="setBg('white',this)">
      <div class="bg-swatch" style="background:#ffffff;border-color:#e2e8f0"></div>Blanco
    </button>
    <button class="chip" data-bg="cream" onclick="setBg('cream',this)">
      <div class="bg-swatch" style="background:#fdf6ec;border-color:#e5d8c0"></div>Crema
    </button>
    <button class="chip" data-bg="navy" onclick="setBg('navy',this)">
      <div class="bg-swatch" style="background:#001233"></div>Marino
    </button>
    <button class="chip" data-bg="forest" onclick="setBg('forest',this)">
      <div class="bg-swatch" style="background:#0a2a1a"></div>Bosque
    </button>
    <button class="chip" data-bg="grad-sunset" onclick="setBg('grad-sunset',this)">
      <div class="bg-swatch" style="background:linear-gradient(135deg,#1a0533,#2d1b69)"></div>Degradado
    </button>
  </div>

  <div class="ctrl-sep"></div>

  <label>📊 Gráficos en pantalla:</label>
  <div class="chip-row" id="chartview-row"></div>

  <div class="ctrl-sep"></div>

  <label>🏷️ Etiquetas a mostrar:</label>
  <div class="chip-row" id="cardview-row"></div>

  <div class="ctrl-sep"></div>

  <label>🔢 Valores en gráficos:</label>
  <div class="chip-row" id="labelview-row"></div>
</div>

<div class="filters" id="filters-bar" style="display:none">
  <div class="dropdown-checklist" id="container-f-mes">
    <span class="dropdown-checklist-label">Mes</span>
    <button class="dropdown-checklist-btn" id="btn-f-mes">Todos</button>
    <div class="dropdown-checklist-content" id="content-f-mes"></div>
  </div>

  <div class="dropdown-checklist" id="container-f-dia">
    <span class="dropdown-checklist-label">Día</span>
    <button class="dropdown-checklist-btn" id="btn-f-dia">Todos</button>
    <div class="dropdown-checklist-content" id="content-f-dia"></div>
  </div>
  
  <div class="dropdown-checklist" id="container-f-ciudad">
    <span class="dropdown-checklist-label">Ciudad</span>
    <button class="dropdown-checklist-btn" id="btn-f-ciudad">Todas</button>
    <div class="dropdown-checklist-content" id="content-f-ciudad"></div>
  </div>

  <div class="dropdown-checklist" id="container-f-tipo">
    <span class="dropdown-checklist-label">Tipo</span>
    <button class="dropdown-checklist-btn" id="btn-f-tipo">Todos</button>
    <div class="dropdown-checklist-content" id="content-f-tipo"></div>
  </div>

  <div class="dropdown-checklist" id="container-f-estado">
    <span class="dropdown-checklist-label">Estado</span>
    <button class="dropdown-checklist-btn" id="btn-f-estado">Todos</button>
    <div class="dropdown-checklist-content" id="content-f-estado"></div>
  </div>

  <div class="dropdown-checklist" id="container-f-solicitante">
    <span class="dropdown-checklist-label">Solicitante</span>
    <button class="dropdown-checklist-btn" id="btn-f-solicitante">Todos</button>
    <div class="dropdown-checklist-content" id="content-f-solicitante"></div>
  </div>

  <button class="btn-reset" onclick="resetFilters()">↺ Limpiar</button>
</div>

<main id="main-content">
  <div class="empty-state" style="height:60vh">
    <div class="empty-icon">📊</div>
    <div style="font-size:1rem;font-weight:700;color:var(--text)">Dashboard listo</div>
    <div>Carga un archivo Excel (.xlsx, .xls) o CSV para comenzar</div>
    <div style="margin-top:10px;font-size:.73rem;opacity:.55">Recarga el archivo en cualquier momento para actualizar los gráficos</div>
  </div>
</main>

<div id="toast"><div class="t-title" id="toast-title"></div><div id="toast-msg"></div></div>

<script>
Chart.register(ChartDataLabels);

// ── PALETTES ────────────────────────────────────────────────────────────────
// Sistema de paletas basado en tipos reales de escalas de datos:
//  · Categórica → colores distintos, sin orden, para identificar categorías (ciudad, medio, solicitante...)
//  · Secuencial → un solo color en degradado, de más intenso a más claro, para resaltar magnitud/ranking
//  · Divergente → degradado entre dos colores que se alejan de un punto neutro, para resaltar polaridad
const PALETTE_CATALOG = {
  categorica: {
    label:'Categórica',
    // Cada variante trae 20 colores (antes 12) para que, incluso en los gráficos
    // con más categorías (ej. Top Ciudades con 12 barras), nunca se repita un
    // color por quedarse corta la lista. `enforceMinToneDiff` además revisa que
    // dos colores vecinos no queden con luminosidad parecida, así que la
    // diversidad se nota aunque haya muchas categorías a la vez.
    variants:{
      set2:    {label:'Set2',     colors:['#4C9F70','#E67E22','#5B84B1','#C0392B','#8E44AD','#F1C40F','#16A085','#D35400','#2C3E50','#7F8C8D','#27AE60','#2980B9','#C2185B','#00838F','#8D6E63','#7CB342','#5E35B1','#F4511E','#546E7A','#AFB42B']},
      tableau: {label:'Tableau',  colors:['#4E79A7','#F28E2B','#E15759','#76B7B2','#59A14F','#EDC948','#B07AA1','#FF9DA7','#9C755F','#BAB0AC','#86BCB6','#D37295','#499894','#B6992D','#8CD17D','#F1CE63','#D4A6C8','#FABFD2','#79706E','#6B4C9A']},
      bold:    {label:'Bold',     colors:['#7F3C8D','#11A579','#3969AC','#F2B701','#E73F74','#80BA5A','#E68310','#008695','#CF1C90','#f97b72','#4b4b8f','#a5aa99','#e58606','#5d69b1','#52bca3','#99c945','#cc61b0','#24796c','#daa51b','#2f8ac4']},
      vivid:   {label:'Vívida',   colors:['#e6194b','#3cb44b','#4363d8','#f58231','#911eb4','#42d4f4','#f032e6','#bfef45','#fabed4','#469990','#dcbeff','#9A6324','#800000','#aaffc3','#808000','#ffd8b1','#000075','#a9a9a9','#ffe119','#000000']},
    }
  },
  secuencial: {
    label:'Secuencial',
    variants:{
      azul:  {label:'Azules', base:'#0d6efd'},
      verde: {label:'Verdes', base:'#0f9d58'},
      ambar: {label:'Ámbar',  base:'#e67e22'},
    }
  },
  divergente: {
    label:'Divergente',
    variants:{
      rojoverde:   {label:'Rojo–Verde',     low:'#d7263d', high:'#2e8b57'},
      moradoverde: {label:'Púrpura–Verde',  low:'#8e44ad', high:'#27ae60'},
      naranjaazul: {label:'Naranja–Azul',   low:'#e67e22', high:'#2980b9'},
    }
  }
};

// Colores semánticos FIJOS para Estado (no cambian con la paleta): siempre
// verde=Impactado(bueno), ámbar=Observado(atención), rojo=Pendiente(riesgo).
// Así lo más importante del dashboard siempre se lee igual, sin importar la paleta elegida.
//
// FIX: los hex originales (#2e8b57, #e6a70b, #d7263d) tenían distinto matiz pero
// casi la MISMA luminosidad entre ámbar y rojo (~47% y ~50%), por lo que en pantalla
// se percibían "del mismo tono". Se recalcula la luminosidad manteniendo el matiz de
// cada color, para asegurar al menos 40% de separación de tono entre colores vecinos.
const ESTADO_FIXED = (function(){
  const order=['IMPACTADO','OBSERVADO','PENDIENTE'];
  const raw={IMPACTADO:'#2e8b57', OBSERVADO:'#e6a70b', PENDIENTE:'#d7263d'};
  const adjusted=enforceMinToneDiff(order.map(k=>raw[k]), 40);
  const map={}; order.forEach((k,i)=>map[k]=adjusted[i]); return map;
})();

let currentPalType = 'categorica';

// ── Interpolación de color (hex) ─────────────────────────────────────────────
function hexToRgb(hex){
  hex=hex.replace('#','');
  if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  const n=parseInt(hex,16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}
function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function lerpColor(c1,c2,t){
  const a=hexToRgb(c1), b=hexToRgb(c2);
  return rgbToHex(a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t);
}

// ── CONTROL DE TONO (LUMINOSIDAD) ENTRE COLORES ──────────────────────────────
// Antes, dos colores vecinos en una paleta podían tener matiz (hue) distinto
// pero la MISMA luminosidad (ej. ámbar #e6a70b y rojo #d7263d, ambos ~48-50%
// de luminosidad), por lo que a simple vista se veían "del mismo tono".
// Estas funciones convierten a HSL, y si dos colores consecutivos quedan a
// menos de `minDiff` puntos de luminosidad, empujan al segundo color hacia el
// extremo claro u oscuro más cercano hasta garantizar esa separación mínima.
function hexToHsl(hex){
  const [r0,g0,b0]=hexToRgb(hex);
  const r=r0/255,g=g0/255,b=b0/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h=0,s=0; const l=(max+min)/2;
  if(max!==min){
    const d=max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h=(g-b)/d + (g<b?6:0); break;
      case g: h=(b-r)/d + 2; break;
      default: h=(r-g)/d + 4; break;
    }
    h*=60;
  }
  return [h, s*100, l*100];
}
function hslToHex(h,s,l){
  h=((h%360)+360)%360; s=Math.max(0,Math.min(100,s))/100; l=Math.max(0,Math.min(100,l))/100;
  const c=(1-Math.abs(2*l-1))*s;
  const x=c*(1-Math.abs((h/60)%2-1));
  const m=l-c/2;
  let r,g,b;
  if(h<60){r=c;g=x;b=0;} else if(h<120){r=x;g=c;b=0;} else if(h<180){r=0;g=c;b=x;}
  else if(h<240){r=0;g=x;b=c;} else if(h<300){r=x;g=0;b=c;} else {r=c;g=0;b=x;}
  return rgbToHex((r+m)*255,(g+m)*255,(b+m)*255);
}
function enforceMinToneDiff(colors, minDiff=40){
  const hsl = colors.map(hexToHsl);
  for(let i=1;i<hsl.length;i++){
    const prevL = hsl[i-1][2];
    const curL  = hsl[i][2];
    if(Math.abs(curL-prevL) < minDiff){
      hsl[i][2] = prevL>=50 ? Math.max(10, prevL-minDiff) : Math.min(90, prevL+minDiff);
    }
  }
  return hsl.map(([h,s,l])=>hslToHex(h, Math.max(s,42), l));
}

// Secuencial: primer valor = color base (más intenso), últimos = más claros.
// Ideal para rankings (top ciudades, top tipos) donde el orden SÍ importa.
function sequentialScale(base,n){
  const arr=[];
  for(let i=0;i<n;i++){
    const t = n<=1?0:(i/(n-1))*0.78;
    arr.push(lerpColor(base,'#eef2f8',t));
  }
  return arr;
}

// Divergente: primera mitad interpola hacia un color bajo, segunda mitad hacia un color alto,
// pasando por un punto neutro. Útil para resaltar polaridad (ej. por debajo/encima del promedio).
function divergingScale(low,high,n){
  const mid='#f2f2f2';
  const arr=[];
  for(let i=0;i<n;i++){
    const t = n<=1?0.5:i/(n-1);
    arr.push(t<=0.5 ? lerpColor(low,mid,t/0.5) : lerpColor(mid,high,(t-0.5)/0.5));
  }
  return arr;
}

function generatePalette(n){
  const type=PALETTE_CATALOG[currentPalType];
  const variant=type.variants[currentPalVariant] || Object.values(type.variants)[0];
  if(currentPalType==='secuencial') return sequentialScale(variant.base,n);
  if(currentPalType==='divergente') return divergingScale(variant.low,variant.high,n);
  // Nota: en secuencial/divergente la cercanía de tono entre pasos ES la señal (magnitud/orden),
  // así que ahí no se fuerza contraste. En categórica sí, porque cada color debe leerse
  // como una categoría distinta.
  const arr=[]; for(let i=0;i<n;i++) arr.push(variant.colors[i%variant.colors.length]);
  return enforceMinToneDiff(arr, 40);
}

  row.innerHTML='';
  const type=PALETTE_CATALOG[currentPalType];

    }else{
      swatch=`<div class="bg-swatch" style="background:linear-gradient(90deg,${v.low},#f2f2f2,${v.high})"></div>`;
    }
    btn.innerHTML=swatch+v.label;
    row.appendChild(btn);
  });
}

// ── APPLY BG THEME ──────────────────────────────────────────────────────────
function applyBg(name) {
  const t = BG_THEMES[name];
  const root = document.documentElement;

  if (t._gradient) {
    document.body.style.background = t['--bg'];
  } else {
    document.body.style.background = '';
    root.style.setProperty('--bg', t['--bg']);
  }

  const skip = ['--bg', '_dark', '_gradient'];
  Object.entries(t).forEach(([k,v]) => {
    if (!skip.includes(k) && k.startsWith('--')) root.style.setProperty(k, v);
  });

  isDarkMode = t._dark;

  const tickCol  = t._dark ? '#6b7a99' : '#555e7a';
  const gridCol  = t._dark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.08)';
  const legendCol= t._dark ? '#b0b8d0' : '#334155';
  Chart.defaults.color = legendCol;

  if (allData.length) renderDashboard(tickCol, gridCol, legendCol);
}

  currentBg = name;
  document.querySelectorAll('#bg-row .chip').forEach(b=>b.classList.remove('active'));

// ── LUMINANCE / CONTRAST ────────────────────────────────────────────────────
function lum(hex){
  const h=hex.replace('#','');
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return (0.299*r+0.587*g+0.114*b)/255;
}
function autoLabel(bg){ return lum(bg.slice(0,7))>0.5?'#111':'#fff'; }

// ── GOOGLE SHEET SYNC ─────────────────────────────────────────────────────────
const GSHEET_REFRESH_MS = 5*60*1000; // auto-actualizar cada 5 minutos
let gsheetInterval = null;
let gsheetActiveUrl = '';

// Acepta un link normal de Google Sheets (edit/view) o uno ya publicado/consultable como CSV,
// y devuelve siempre una URL con la que el navegador SÍ pueda leer los datos.
//
// FIX: la URL clásica "/export?format=csv" no funcionaba porque Google no responde con
// cabecera Access-Control-Allow-Origin en ese endpoint, así que el navegador bloqueaba
// la petición por CORS (por eso nunca conectaba, sin importar el link pegado).
// El endpoint "gviz/tq?tqx=out:csv" es la vía pública de Google Visualization API y
// sí incluye esa cabecera, por lo que puede leerse desde cualquier origen sin backend propio.
function toCsvExportUrl(url){
  url = url.trim();
  // Ya es una URL de consulta/exportación CSV
  if(/tqx=out:csv|output=csv|format=csv/.test(url)) return url;
  // Link típico: https://docs.google.com/spreadsheets/d/<ID>/edit#gid=<GID>
  const m = url.match(/\/spreadsheets\/d\/(?:e\/)?([a-zA-Z0-9-_]+)/);
  if(m){
    const id = m[1];
    const gidMatch = url.match(/[?#&]gid=([0-9]+)/);
    const gid = gidMatch ? gidMatch[1] : '0';
    return `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&gid=${gid}`;
  }
  return url; // se asume que ya es una URL CSV válida
}

// URL de respaldo (export csv clásico) por si el Sheet tiene alguna restricción particular
// que impida usar gviz/tq. Se intenta solo si la principal falla.
function toFallbackExportUrl(url){
  const m = url.match(/\/spreadsheets\/d\/(?:e\/)?([a-zA-Z0-9-_]+)/);
  if(!m) return null;
  const id = m[1];
  const gidMatch = url.match(/[?#&]gid=([0-9]+)/);
  const gid = gidMatch ? gidMatch[1] : '0';
  return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
}

// FIX #2: el link "publicado" (…/pub?...&output=csv) responde con un REDIRECT hacia
// un dominio doc-XX-XX-sheets.googleusercontent.com que, a diferencia de docs.google.com,
// casi nunca envía cabecera Access-Control-Allow-Origin. Por eso el fetch directo fallaba
// siempre con ese tipo de link específico (el que usa el usuario), aunque otros formatos
// de URL de Google Sheets sí funcionaran. Para resolverlo, si el fetch directo falla por
// CORS/red, se reintenta el mismo contenido a través de un proxy CORS público que sí
// agrega esa cabecera.
//
// FIX #3: "corsproxy.io" en su plan gratuito SOLO acepta peticiones que llegan desde un
// puñado de orígenes concretos (localhost, CodePen, GitHub Pages, StackBlitz, etc.). Si el
// dashboard se abre desde cualquier otro dominio (o como archivo local en algunos
// navegadores), corsproxy.io rechaza la petición y el error se ve idéntico a un CORS normal
// ("Failed to fetch"), aunque el Sheet esté perfectamente publicado. Por eso ahora se prueban
// varios proxies sin esa restricción de origen, y se deja corsproxy.io solo como último recurso.
const CORS_PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
];

async function tryFetchCsv(url){
  const res = await fetch(url + (url.includes('?')?'&':'?') + '_ts=' + Date.now());
  if(!res.ok) throw new Error('HTTP '+res.status);
  const text = await res.text();
  // Si Google devuelve una página HTML (login, error, "necesita permiso"...) en vez de
  // CSV, se trata como fallo para poder pasar al siguiente candidato de la lista.
  if(!text.trim() || /^\s*<(!doctype|html)/i.test(text)) throw new Error('la respuesta no es un CSV válido (¿HTML de error?)');
  return text;
}

async function fetchGSheetData(silent){
  if(!gsheetActiveUrl) return;
  if(!silent) showToast('Sincronizando…','Descargando datos del Google Sheet','#00d4ff');

  // Candidatos a probar en orden: URL activa → URL de respaldo clásica → ambas
  // otra vez pero a través de varios proxies CORS distintos.
  const candidates = [{label:'directo', url:gsheetActiveUrl}];
  const fb = toFallbackExportUrl(gsheetActiveUrl);
  if(fb && fb !== gsheetActiveUrl) candidates.push({label:'respaldo export=csv', url:fb});
  const withProxies = [...candidates];
  candidates.forEach(c => CORS_PROXIES.forEach((makeProxyUrl,i) =>
    withProxies.push({label:'proxy #'+(i+1), url:makeProxyUrl(c.url)})
  ));

  let csvText = null;
  const attempts = []; // guarda el detalle de cada intento fallido, para diagnóstico
  for(const c of withProxies){
    try{ csvText = await tryFetchCsv(c.url); break; }
    catch(err){ attempts.push(c.label+': '+err.message); }
  }

  if(csvText === null){
    const detail = attempts.join(' | ');
    document.getElementById('sync-status').textContent = '⚠️ Error de sync (todos los intentos fallaron)';
    if(!silent) showToast(
      'Error de sincronización',
      'No se pudo leer el Sheet desde ningún método (directo ni proxies). Esto suele ser un bloqueo de red/extensión del navegador hacia dominios externos, no un problema del Sheet. Prueba en una ventana de incógnito sin extensiones, o en otra red. Detalle: '+detail,
      '#ff4d6d'
    );
    return;
  }

  try{
    const wb = XLSX.read(csvText,{type:'string'});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
    processData(rows,'Google Sheet (sincronizado)');
    document.getElementById('sync-status').textContent = '✅ Última sync: '+new Date().toLocaleTimeString('es-PE');
  }catch(err){
    document.getElementById('sync-status').textContent = '⚠️ Error de sync: '+err.message;
    if(!silent) showToast('Error de sincronización','No se pudo interpretar el CSV recibido. Detalle: '+err.message,'#ff4d6d');
  }
}

// ── DATA PROCESS ─────────────────────────────────────────────────────────────
function processData(rows,fileName){
  let headerIdx=-1;
  for(let i=0;i<Math.min(rows.length,20);i++){
    const r=rows[i].map(c=>String(c).trim().toUpperCase());
    if(r.includes('MES')&&r.includes('CIUDAD')){headerIdx=i;break;}
  }
  let data=[];
  if(headerIdx>=0){
    const h=rows[headerIdx].map(c=>String(c).trim().toUpperCase());
    const fi=(k1,k2)=>h.findIndex(x=>x.includes(k1)&&(!k2||x.includes(k2)));
    const [mi,fi2,ci,co,ts,tm,si,me,es,mo]=[
      fi('MES'),fi('FECHA'),fi('CIUDAD'),fi('DIGO'),
      fi('SOLICITUD','TIPO'),fi('MODIFICACI','TIPO'),
      fi('SOLICITANTE'),fi('MEDIO'),fi('ESTADO'),fi('MOTIVO')
    ];
    for(let i=headerIdx+1;i<rows.length;i++){
      const r=rows[i];
      const mes=String(r[mi]||'').trim().toUpperCase();
      if(!mes||mes==='MES') continue;

      // ── CONVERSIÓN ADAPTATIVA A DÍA NATURAL (01 - 31) ──
      const rawFecha = String(r[fi2]||'').trim();
      let diaStr = '';
      
      if(rawFecha) {
        // Caso 1: Si es un número de serie de Excel (Ej: 45658 o similar)
        if (/^\d{5}(\.\d+)?$/.test(rawFecha)) {
          const excelDate = Float64Array.from([parseFloat(rawFecha)])[0];
          // Ajuste de desfase histórico de bisiestos de Excel (1900)
          const dateObj = new Date(Math.round((excelDate - 25569) * 86400 * 1000));
          if (!isNaN(dateObj.getTime())) {
            // Añadir +1 día para mitigar desfases de zona horaria local durante la conversión UTC
            dateObj.setUTCDate(dateObj.getUTCDate() + 1);
            diaStr = String(dateObj.getUTCDate()).padStart(2, '0');
          }
        } 
        // Caso 2: Formatos estándar de texto (DD/MM/AAAA, MM/DD/AAAA, AAAA-MM-DD...)
        //
        // FIX: antes se asumía siempre DD/MM/AAAA y se tomaba el primer número como
        // día. Pero si el Google Sheet exporta las fechas en formato MM/DD/AAAA
        // (configuración regional en inglés), el primer número es el MES, no el día.
        // Como en julio el mes siempre es "07", todas las filas terminaban con
        // diaStr='07' sin importar el día real: por eso solo aparecía el día 07.
        // Ahora se usa el mes que ya conocemos (columna MES, ej. "JULIO") para
        // saber cuál de los dos números es realmente el día.
        else {
          const mesNum = MES_ORDER.indexOf(mes) + 1; // 1-12, o 0 si no se reconoce el mes
          if (/^\d{4}[-/]/.test(rawFecha)) {
            // Empieza con año (AAAA-MM-DD): día y mes están al final, en ese orden
            const matchEnd = rawFecha.match(/[-/](\d{1,2})[-/](\d{1,2})$/);
            if (matchEnd) {
              const a = parseInt(matchEnd[1], 10), b = parseInt(matchEnd[2], 10);
              // AAAA-MM-DD -> a=mes, b=día
              diaStr = String(mesNum && a === mesNum ? b : (b === mesNum ? a : b)).padStart(2, '0');
            }
          } else {
            // DD/MM/AAAA o MM/DD/AAAA: dos primeros componentes ambiguos
            const matchStart = rawFecha.match(/^(\d{1,2})[-/](\d{1,2})/);
            if (matchStart) {
              const a = parseInt(matchStart[1], 10), b = parseInt(matchStart[2], 10);
              if (mesNum && a === mesNum && b !== mesNum) diaStr = String(b).padStart(2, '0');       // MM/DD -> día=b
              else if (mesNum && b === mesNum && a !== mesNum) diaStr = String(a).padStart(2, '0');  // DD/MM -> día=a
              else diaStr = String(a).padStart(2, '0'); // ambiguo (ej. mes desconocido): se mantiene el criterio anterior (DD/MM)
            } else {
              const single = rawFecha.match(/^(\d{1,2})/);
              if (single) diaStr = String(parseInt(single[1], 10)).padStart(2, '0');
            }
          }
        }
      }

      data.push({
        mes,fecha:rawFecha,dia:diaStr,ciudad:String(r[ci]||'').trim().toUpperCase(),
        codigo:String(r[co]||'').trim(),tipoSol:String(r[ts]||'').trim().toUpperCase(),
        tipoMod:String(r[tm]||'').trim().toUpperCase(),solicitante:String(r[si]||'').trim().toUpperCase(),
        medio:String(r[me]||'').trim().toUpperCase(),estado:String(r[es]||'').trim().toUpperCase(),
        motivo:String(r[mo]||'').trim(),
      });
    }
  }
  if(!data.length){showToast('Sin datos','No se encontraron registros.','#ff4d6d');return;}
  allData=data;
  
  // Limpiar estados previos de filtros
  Object.keys(selectedFilters).forEach(k => selectedFilters[k] = []);
  
  populateFilters();
  setupDropdownToggleListeners();
  
  document.getElementById('filters-bar').style.display='flex';
  document.getElementById('status-dot').classList.add('active');
  document.getElementById('status-text').textContent=data.length.toLocaleString('es')+' registros';
  document.getElementById('header-meta').textContent=fileName+' · '+data.length.toLocaleString('es')+' registros';
  document.getElementById('last-update').textContent='🔄 '+new Date().toLocaleString('es-PE');
  renderDashboard();
  showToast('✅ Cargado',data.length.toLocaleString('es')+' registros procesados.','#00e676');
}

// ── DINAMIC POPULATE FOR CHECKLIST FILTERS ───────────────────────────────────
function populateFilters(){
  const fill = (contentId, btnId, key, labelPlural, order) => {
    const contentDiv = document.getElementById(contentId);
    const btn = document.getElementById(btnId);
    
    // Si el filtro es el DÍA, depende de los meses seleccionados en selectedFilters.mes
    let sourceData = allData;
    if (key === 'dia' && selectedFilters.mes.length > 0) {
      sourceData = allData.filter(d => selectedFilters.mes.includes(d.mes));
    }

    const vals = [...new Set(sourceData.map(d=>d[key]).filter(Boolean))];
    let sorted;
    if (order) {
      sorted = vals.sort((a,b)=>order.indexOf(a)-order.indexOf(b));
    } else if (key === 'dia') {
      sorted = vals.sort((a,b)=>parseInt(a,10)-parseInt(b,10)); // Ordenación numérica estricta para días
    } else {
      sorted = vals.sort();
    }
    
    contentDiv.innerHTML = '';
    
    // Validar si los elementos previamente seleccionados aún existen en el nuevo set de datos
    selectedFilters[key] = selectedFilters[key].filter(x => sorted.includes(x));
    
    // Actualizar texto del botón principal
    if (selectedFilters[key].length === 0) {
      btn.textContent = labelPlural;
    } else if (selectedFilters[key].length === 1) {
      btn.textContent = selectedFilters[key][0];
    } else {
      btn.textContent = `${selectedFilters[key].length} sel.`;
    }
    
    sorted.forEach(v => {
      const item = document.createElement('div');
      item.className = 'dropdown-item';
      
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.value = v;
      chk.id = `chk-${key}-${v.replace(/\s+/g, '-')}`;
      
      if (selectedFilters[key].includes(v)) {
        chk.checked = true;
      }
      
      const lbl = document.createElement('label');
      lbl.htmlFor = chk.id;
      lbl.textContent = v;
      lbl.style.cursor = 'pointer';
      lbl.style.flex = '1';
      
      item.appendChild(chk);
      item.appendChild(lbl);
      
      item.addEventListener('click', (e) => {
        if (e.target !== chk && e.target !== lbl) {
          chk.checked = !chk.checked;
          chk.dispatchEvent(new Event('change'));
        }
      });
      
      chk.addEventListener('change', () => {
        if (chk.checked) {
          if (!selectedFilters[key].includes(v)) selectedFilters[key].push(v);
        } else {
          selectedFilters[key] = selectedFilters[key].filter(x => x !== v);
        }
        
        if (selectedFilters[key].length === 0) {
          btn.textContent = labelPlural;
        } else if (selectedFilters[key].length === 1) {
          btn.textContent = selectedFilters[key][0];
        } else {
          btn.textContent = `${selectedFilters[key].length} sel.`;
        }
        
        if (key === 'mes') {
          fill('content-f-dia', 'btn-f-dia', 'dia', 'Todos');
        }
        
        renderDashboard();
      });
      
      contentDiv.appendChild(item);
    });
  };
  
  fill('content-f-mes', 'btn-f-mes', 'mes', 'Todos', MES_ORDER);
  fill('content-f-dia', 'btn-f-dia', 'dia', 'Todos');
  fill('content-f-ciudad', 'btn-f-ciudad', 'ciudad', 'Todas');
  fill('content-f-tipo', 'btn-f-tipo', 'tipoSol', 'Todos');
  fill('content-f-estado', 'btn-f-estado', 'estado', 'Todos');
  fill('content-f-solicitante', 'btn-f-solicitante', 'solicitante', 'Todos');
}

function setupDropdownToggleListeners() {
  document.querySelectorAll('.dropdown-checklist-btn').forEach(btn => {
    btn.onclick = function(e) {
      e.stopPropagation();
      const parent = this.parentElement;
      const isOpen = parent.classList.contains('open');
      
      document.querySelectorAll('.dropdown-checklist').forEach(el => el.classList.remove('open'));
      
      if (!isOpen) {
        parent.classList.add('open');
      }
    };
  });

  document.onclick = function(e) {
    if (!e.target.closest('.dropdown-checklist')) {
      document.querySelectorAll('.dropdown-checklist').forEach(el => el.classList.remove('open'));
    }
  };
}

// ── FILTER DATA ──────────────────────────────────────────────────────────────
function filterData(){
  return allData.filter(d => {
    const mMatch = selectedFilters.mes.length === 0 || selectedFilters.mes.includes(d.mes);
    const dMatch = selectedFilters.dia.length === 0 || selectedFilters.dia.includes(d.dia);
    const cMatch = selectedFilters.ciudad.length === 0 || selectedFilters.ciudad.includes(d.ciudad);
    const tMatch = selectedFilters.tipoSol.length === 0 || selectedFilters.tipoSol.includes(d.tipoSol);
    const eMatch = selectedFilters.estado.length === 0 || selectedFilters.estado.includes(d.estado);
    const sMatch = selectedFilters.solicitante.length === 0 || selectedFilters.solicitante.includes(d.solicitante);
    return mMatch && dMatch && cMatch && tMatch && eMatch && sMatch;
  });
}

function resetFilters(){
  Object.keys(selectedFilters).forEach(k => selectedFilters[k] = []);
  document.querySelectorAll('.dropdown-checklist-content input[type="checkbox"]').forEach(chk => chk.checked = false);
  
  document.getElementById('btn-f-mes').textContent = 'Todos';
  document.getElementById('btn-f-dia').textContent = 'Todos';
  document.getElementById('btn-f-ciudad').textContent = 'Todas';
  document.getElementById('btn-f-tipo').textContent = 'Todos';
  document.getElementById('btn-f-estado').textContent = 'Todos';
  document.getElementById('btn-f-solicitante').textContent = 'Todos';
  
  populateFilters();
  renderDashboard();
}

function countBy(data,key){const m={};data.forEach(d=>{const v=d[key];m[v]=(m[v]||0)+1;});return m;}
function topN(map,n){return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,n);}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function mkChart(id,cfg,labelKey){
  destroyChart(id);
  const ctx=document.getElementById(id)?.getContext('2d');
  if(!ctx)return;
  // Si el usuario apagó las etiquetas de este gráfico en "🏷️ Etiquetas a mostrar",
  // se fuerza display:false tanto a nivel de plugin como de cada dataset (el
  // datalabels de dataset tiene prioridad sobre el del plugin, por eso hay que
  // pisar ambos para que realmente desaparezcan).
  if(labelKey && !labelsVisible.has(labelKey)){
    if(cfg.options && cfg.options.plugins && cfg.options.plugins.datalabels){
      cfg.options.plugins.datalabels = {display:false};
    }
    (cfg.data && cfg.data.datasets || []).forEach(ds=>{
      if(ds.datalabels) ds.datalabels = {display:false};
    });
  }
  charts[id]=new Chart(ctx,cfg);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderDashboard(){
  const data=filterData(), n=data.length;
  const imp=data.filter(d=>d.estado==='IMPACTADO').length;
  const obs=data.filter(d=>d.estado==='OBSERVADO').length;
  const pen=data.filter(d=>d.estado==='PENDIENTE').length;
  const pI=n?Math.round(imp/n*100):0;

  const visibleDefs = CHART_DEFS.filter(c=>visibleCharts.has(c.key));
  const chartsHtml = visibleDefs.length
    ? `<div class="chart-grid">${visibleDefs.map(c=>{
        let html = chartBoxHTML(c.boxId,c.canvasId,c.title,c.sub,c.h);
        if(c.full) html = html.replace('class="chart-box"','class="chart-box full"');
        return html;
      }).join('')}</div>`
    : `<div class="empty-state" style="height:160px">
        <div class="empty-icon">👁️</div>
        <div>No hay gráficos seleccionados para mostrar</div>
        <div style="font-size:.73rem;opacity:.6">Actívalos en "📊 Gráficos en pantalla" arriba</div>
      </div>`;

  const cardHtmlMap = {
    total:      cardHTML('card-total','c1','Total Modificaciones',n.toLocaleString('es'),'registros en el período','📋'),
    impactadas: cardHTML('card-impactadas','c2','Impactadas ✅',imp.toLocaleString('es'),pI+'% del total','✅'),
    observadas: cardHTML('card-observadas','c3','Observadas ⚠️',obs.toLocaleString('es'),(n?Math.round(obs/n*100):0)+'% del total','⚠️'),
    pendientes: cardHTML('card-pendientes','c4','Pendientes 🕐',pen.toLocaleString('es'),(n?Math.round(pen/n*100):0)+'% del total','🕐'),
  };
  const cardsHtml = CARD_DEFS.filter(c=>visibleCards.has(c.key)).map(c=>cardHtmlMap[c.key]).join('');

  document.getElementById('main-content').innerHTML=`
    ${cardsHtml ? `<div class="cards">${cardsHtml}</div>` : ''}
    ${chartsHtml}`;

  setTimeout(()=>{
    visibleDefs.forEach(c=>c.build(data));
    Object.keys(boxSizeState).forEach(applyBoxSize);
  },0);
}

// ── TAMAÑO ADAPTATIVO POR CUADRO ─────────────────────────────────────────────
function cycleBoxSize(boxId){
  const order=['s','m','l'];
  const cur=boxSizeState[boxId]||'m';
  boxSizeState[boxId]=order[(order.indexOf(cur)+1)%order.length];
  applyBoxSize(boxId);
}
function applyBoxSize(boxId){
  const box=document.getElementById(boxId); if(!box) return;
  const size=BOX_SIZES[boxSizeState[boxId]||'m'];
  box.classList.toggle('full', !!size.full);
  const wrap=box.querySelector('.chart-wrap');
  if(wrap) wrap.style.height=size.h+'px';
  const canvas=box.querySelector('canvas');
  if(canvas && charts[canvas.id]) setTimeout(()=>charts[canvas.id].resize(),0);
}

// ── CAPTURA DE PANTALLA (por cuadro) ─────────────────────────────────────────
async function captureBox(boxId,title){
  const el=document.getElementById(boxId); if(!el) return;
  showToast('Capturando…',title,'#00d4ff');
  try{
    const canvas=await html2canvas(el,{backgroundColor:null,scale:2});
    const link=document.createElement('a');
    const fecha=new Date().toISOString().slice(0,10);
    link.download=`${title.replace(/\s+/g,'-').toLowerCase()}-${fecha}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    showToast('✅ Capturado','Imagen descargada: '+link.download,'#00e676');
  }catch(err){
    showToast('Error','No se pudo capturar: '+err.message,'#ff4d6d');
  }
}

// ── CHARTS ───────────────────────────────────────────────────────────────────
function scaleOpts(){
  return{
    ticks:{color:tickColor()},
    grid:{color:gridColor()},
  };
}

function buildMes(data){
  const pal = PAL();
  const meses = [...new Set(data.map(d=>d.mes))].sort((a,b)=>MES_ORDER.indexOf(a)-MES_ORDER.indexOf(b));
  const tipos = [...new Set(data.map(d=>d.tipoSol).filter(Boolean))].filter(t=>t!=='TIPO DE SOLICITUD');
  
  const ds = tipos.map((t,i)=>({
    label:t,
    type: 'bar',
    data:meses.map(m=>data.filter(d=>d.mes===m&&d.tipoSol===t).length),
    backgroundColor:pal[i%pal.length]+'d0',borderColor:pal[i%pal.length],borderWidth:1,borderRadius:4,
    order: 1
  }));

  if (meses.length > 0) {
    const totalesMensuales = meses.map(m => data.filter(d => d.mes === m).length);

    ds.push({
      label: 'Tendencia Total',
      type: 'line',
      data: totalesMensuales,
      borderColor: '#00a2ff',
      borderWidth: 3.5,
      pointRadius: 6,
      pointBackgroundColor: '#00d4ff',
      pointBorderColor: '#00a2ff',
      pointBorderWidth: 2,
      fill: false,
      stacked: false,
      tension: 0,
      order: 0,
      datalabels: {
        display: true,
        align: 'top',
        anchor: 'end',
        color: '#00a2ff',
        font: { size: 10, weight: '700' },
        formatter: v => v > 0 ? v.toLocaleString('es') : ''
      }
    });
  }

  mkChart('ch-mes',{type:'bar',data:{labels:meses,datasets:ds},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{
        position: 'bottom',
        labels:{color:legendColor(),boxWidth:13,padding:14,font:{size:11}}
      },
      tooltip:{...tip()},
      datalabels:{
        display:ctx=>ctx.dataset.type === 'bar' && ctx.dataset.data[ctx.dataIndex]>0,
        color:ctx=>autoLabel(ctx.dataset.backgroundColor),
        font:{size:9,weight:'700'},anchor:'center',align:'center',
        formatter:v=>v>0?v.toLocaleString('es'):'',
      }
    },
    scales:{
      x:{...scaleOpts(),stacked:true},
      y:{...scaleOpts(),stacked:true,grace:'20%'}
    },
  }},'mes');
}

function buildCiudad(data){
  const pal=PAL();
  const top=topN(countBy(data,'ciudad'),12);
  mkChart('ch-ciudad',{type:'bar',
    data:{labels:top.map(([k])=>k),datasets:[{
      label:'Solicitudes',data:top.map(([,v])=>v),
      backgroundColor:pal.map(c=>c+'cc'),borderColor:pal,borderWidth:1,borderRadius:4,
    }]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...tip()},
        datalabels:{
          color:legendColor(),font:{size:10,weight:'700'},
          anchor:'end',align:'right',clamp:true,
          formatter:v=>v.toLocaleString('es'),padding:{right:4},
        }
      },
      scales:{x:{...scaleOpts()},y:{ticks:{color:tickColor(),font:{size:11}},grid:{display:false}}},
      layout:{padding:{right:55}},
    }
  },'ciudad');
}

function buildEstado(data){
  const map=countBy(data,'estado');
  const keys=Object.keys(map).filter(k=>k&&k!=='ESTADO');
  const vals=keys.map(k=>map[k]);
  const total=vals.reduce((a,b)=>a+b,0);
  const colors=keys.map(k=>ECOL(k));
  mkChart('ch-estado',{type:'doughnut',
    data:{labels:keys,datasets:[{data:vals,backgroundColor:colors,borderColor:isDarkMode?'#0d0f14':'#fff',borderWidth:3,hoverOffset:10}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{
        legend:{position:'bottom',labels:{color:legendColor(),boxWidth:13,padding:14,font:{size:11}}},
        tooltip:{...tip(),callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed.toLocaleString('es')} (${Math.round(ctx.parsed/total*100)}%)`}},
        datalabels:{
          color:'#fff',font:{size:12,weight:'700'},
          textStrokeColor: 'rgba(0,0,0,.5)',textStrokeWidth:2,
          formatter:(v,ctx)=>{const p=Math.round(v/total*100);return p>=4?`${v.toLocaleString('es')}\n(${p}%)`:'';},
          textAlign:'center',
        }
      }
    }
  },'estado');
}

function buildTipoMod(data){
  const pal=PAL();
  const filt=data.filter(d=>d.tipoMod&&d.tipoMod!=='TIPO DE MODIFICACIÓN'&&d.tipoMod!=='MODIFICACION TIPO');
  const top=topN(countBy(filt,'tipoMod'),10);
  mkChart('ch-tipomod',{type:'bar',
    data:{labels:top.map(([k])=>k.replace('MOD. ','')),datasets:[{
      label:'Cantidad',data:top.map(([,v])=>v),
      backgroundColor:pal.slice(0,10).map(c=>c+'cc'),borderColor:pal.slice(0,10),borderWidth:1,borderRadius:4,
    }]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...tip()},
        datalabels:{
          color:legendColor(),font:{size:10,weight:'700'},
          anchor:'end',align:'right',clamp:true,
          formatter:v=>v.toLocaleString('es'),padding:{right:4},
        }
      },
      scales:{x:{...scaleOpts()},y:{ticks:{color:tickColor(),font:{size:10}},grid:{display:false}}},
      layout:{padding:{right:60}},
    }
  },'tipomod');
}

function buildMedio(data){
  // Barras horizontales en vez de pie: para comparar cantidades entre canales,
  // una barra se lee con más precisión que sectores circulares.
  const pal=PAL();
  const filt=data.filter(d=>d.medio&&d.medio!=='MEDIO DE SOLICITUD');
  const map=countBy(filt,'medio');
  const total=Object.values(map).reduce((a,b)=>a+b,0);
  const top=topN(map,10);
  mkChart('ch-medio',{type:'bar',
    data:{labels:top.map(([k])=>k),datasets:[{
      label:'Solicitudes',data:top.map(([,v])=>v),
      backgroundColor:pal.slice(0,top.length).map(c=>c+'cc'),borderColor:pal.slice(0,top.length),borderWidth:1,borderRadius:4,
    }]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{...tip(),callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed.x.toLocaleString('es')} (${total?Math.round(ctx.parsed.x/total*100):0}%)`}},
        datalabels:{
          color:legendColor(),font:{size:10,weight:'700'},anchor:'end',align:'right',clamp:true,
          formatter:v=>`${v.toLocaleString('es')} (${total?Math.round(v/total*100):0}%)`,padding:{right:4},
        }
      },
      scales:{x:{...scaleOpts()},y:{ticks:{color:tickColor(),font:{size:11}},grid:{display:false}}},
      layout:{padding:{right:85}},
    }
  },'medio');
}

function buildSolicitante(data){
  const pal=PAL();
  const filt=data.filter(d=>d.solicitante&&d.solicitante!=='SOLICITANTE');
  const top=topN(countBy(filt,'solicitante'),6);
  mkChart('ch-sol',{type:'bar',
    data:{labels:top.map(([k])=>k),datasets:[{
      label:'Solicitudes',data:top.map(([,v])=>v),
      backgroundColor:pal.slice(0,6).map(c=>c+'cc'),borderColor:pal.slice(0,6),borderWidth:1,borderRadius:6,
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...tip()},
        datalabels:{
          color:legendColor(),font:{size:11,weight:'700'},
          anchor:'end',align:'top',clamp:true,formatter:v=>v.toLocaleString('es'),
        }
      },
      scales:{x:{ticks:{color:tickColor(),font:{size:10}},grid:{display:false}},y:{...scaleOpts()}},
      layout:{padding:{top:22}},
    }
  },'sol');
}

function buildEstadoMes(data){
  const meses=[...new Set(data.map(d=>d.mes))].sort((a,b)=>MES_ORDER.indexOf(a)-MES_ORDER.indexOf(b));
  const eKeys=['IMPACTADO','OBSERVADO','PENDIENTE'];
  const eCols=eKeys.map(e=>ECOL(e));
  const ds=eKeys.map((e,i)=>({
    label:e,data:meses.map(m=>data.filter(d=>d.mes===m&&d.estado===e).length),
    borderColor:eCols[i],backgroundColor:eCols[i]+'28',
    borderWidth:2.5,tension:.4,fill:true,pointRadius:5,pointBackgroundColor:eCols[i],
  }));
  mkChart('ch-estadomes',{type:'line',data:{labels:meses,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:legendColor(),boxWidth:12,font:{size:11}}},
        tooltip:{...tip(),mode:'index',intersect:false},
        datalabels:{
          display:ctx=>ctx.dataset.data[ctx.dataIndex]>0,
          color:ctx=>eCols[ctx.datasetIndex],
          font:{size:9,weight:'700'},anchor:'top',align:'top',clamp:true,
          formatter:v=>v>0?v.toLocaleString('es'):'',
        }
      },
      scales:{x:{...scaleOpts()},y:{...scaleOpts()}},
      layout:{padding:{top:18}},
    }
  },'estadomes');
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(title,msg,color='#00e676'){
  const t=document.getElementById('toast');
  document.getElementById('toast-title').style.color=color;
  document.getElementById('toast-title').textContent=title;
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4000);
}
